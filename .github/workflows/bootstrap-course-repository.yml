name: bootstrap-course-repository

# Regenerates the simplified textbook-style course repository.
on:
  workflow_dispatch:
  push:
    paths:
      - scripts/bootstrap_course_repository.py
      - scripts/enrich_lessons.py
      - .github/workflows/bootstrap-course-repository.yml

permissions:
  contents: write

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Repair generator newline escape
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path("scripts/bootstrap_course_repository.py")
          text = path.read_text(encoding="utf-8")
          fixed = text.replace('raise AssertionError("\\n".join(errors[:50]))', 'raise AssertionError(chr(10).join(errors[:50]))')
          fixed = fixed.replace('raise AssertionError("\\\\n".join(errors[:50]))', 'raise AssertionError(chr(10).join(errors[:50]))')
          if 'raise AssertionError(chr(10).join(errors[:50]))' not in fixed:
              matches = [line for line in text.splitlines() if 'raise AssertionError' in line and 'errors[:50]' in line]
              raise SystemExit(f"generator repair could not verify target line: {matches}")
          path.write_text(fixed, encoding="utf-8")
          PY
      - name: Install enriched lesson generator
        run: |
          python - <<'PY'
          import base64
          import gzip
          from pathlib import Path
          data = ""
          Path("scripts/enrich_lessons.py").write_bytes(gzip.decompress(base64.b64decode(data)))
          PY
      - name: Generate repository content
        run: python scripts/bootstrap_course_repository.py
      - name: Enrich day lesson files
        run: python scripts/enrich_lessons.py
      - name: Install validation dependencies
        run: python -m pip install -r requirements-dev.txt
      - name: Validate generated content
        run: |
          python scripts/validate_structure.py
          python scripts/validate_markdown_links.py
          python scripts/check_required_sections.py
          python scripts/execute_lessons.py
          python scripts/validate_datasets.py
          python -m pytest
      - name: Commit generated repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          if git diff --cached --quiet; then
            echo "No generated changes to commit."
          else
            git commit -m "Generate simplified textbook-style course repository"
            git push
          fi
