name: bootstrap-course-repository

# This workflow bootstraps the complete generated course repository.
on:
  workflow_dispatch:
  push:
    paths:
      - scripts/bootstrap_course_repository.py
      - .github/workflows/bootstrap-course-repository.yml

permissions:
  contents: write

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Generate repository content
        run: python scripts/bootstrap_course_repository.py
      - name: Repair generated validation scripts
        run: |
          python - <<'PY'
          from pathlib import Path
          import textwrap

          def write(path: str, body: str) -> None:
              Path(path).write_text(textwrap.dedent(body).strip() + "\n", encoding="utf-8")

          write("scripts/validate_markdown_links.py", r'''
          import re
          from pathlib import Path

          ROOT = Path(__file__).resolve().parents[1]
          link_re = re.compile(r"\[[^\]]+\]\(([^)]+)\)")
          errors = []

          for md in ROOT.rglob("*.md"):
              text = md.read_text(encoding="utf-8")
              for target in link_re.findall(text):
                  if target.startswith(("http://", "https://", "mailto:", "#")):
                      continue
                  clean = target.split("#", 1)[0]
                  if clean and not (md.parent / clean).exists():
                      errors.append(f"{md.relative_to(ROOT)} -> {target}")

          if errors:
              raise AssertionError("\n".join(errors[:50]))
          print("validate_markdown_links: OK")
          ''')

          write("scripts/check_required_sections.py", r'''
          from pathlib import Path
          from course_config import DAYS

          ROOT = Path(__file__).resolve().parents[1]
          WEEK_SLUGS = {
              1: "week01_python_foundations",
              2: "week02_numpy_pandas_statistics",
              3: "week03_pytorch_and_machine_learning",
              4: "week04_transformer_and_llm",
          }
          REQUIRED = {
              "01_concepts/README.md": ["## 1. 오늘의 위치", "## 2. 학습 목표", "## 4. 핵심 개념"],
              "02_examples/README.md": ["## 예제 목표", "## 실행 순서"],
              "03_practice/README.md": ["## 실습 원칙", "## 문제 1", "## 문제 5"],
              "04_quiz/README.md": ["## 객관식", "## 단답형", "## 코드 읽기", "## 디버깅"],
          }

          for day, week, slug in DAYS:
              base = ROOT / "weeks" / WEEK_SLUGS[week] / slug
              for rel, headings in REQUIRED.items():
                  text = (base / rel).read_text(encoding="utf-8")
                  for heading in headings:
                      if heading not in text:
                          raise AssertionError(f"missing section {heading} in {base / rel}")
          print("check_required_sections: OK")
          ''')

          write("scripts/validate_notebooks.py", r'''
          import json
          from pathlib import Path

          ROOT = Path(__file__).resolve().parents[1]
          count = 0
          for path in ROOT.rglob("*.ipynb"):
              data = json.loads(path.read_text(encoding="utf-8"))
              if data.get("nbformat") != 4:
                  raise AssertionError(f"invalid notebook: {path}")
              if not data.get("cells"):
                  raise AssertionError(f"empty notebook: {path}")
              joined = json.dumps(data, ensure_ascii=False)
              for token in ["TODO", "placeholder", "추후 작성", "생략"]:
                  if token in joined:
                      raise AssertionError(f"banned token {token}: {path}")
              if "practice_student" in path.name and "풀이 예시입니다" in joined:
                  raise AssertionError(f"solution leak: {path}")
              count += 1
          if count != 84:
              raise AssertionError(f"expected 84 notebooks, found {count}")
          print("validate_notebooks: OK")
          ''')

          write("scripts/execute_notebooks.py", r'''
          import json
          from pathlib import Path

          ROOT = Path(__file__).resolve().parents[1]
          executed = 0
          for path in ROOT.rglob("*.ipynb"):
              data = json.loads(path.read_text(encoding="utf-8"))
              env = {"__name__": "__notebook__"}
              for cell in data["cells"]:
                  if cell["cell_type"] == "code":
                      source = "".join(cell["source"])
                      exec(compile(source, str(path), "exec"), env)
              executed += 1
          print(f"execute_notebooks: OK ({executed} notebooks)")
          ''')

          write("scripts/validate_datasets.py", r'''
          import csv
          from pathlib import Path

          ROOT = Path(__file__).resolve().parents[1]
          files = ["synthetic_patients.csv", "synthetic_labs.csv", "synthetic_visits.csv", "synthetic_notes.csv"]
          patient_ids = set()
          for name in files:
              path = ROOT / "datasets" / name
              rows = list(csv.DictReader(path.open(encoding="utf-8")))
              if not rows:
                  raise AssertionError(f"empty dataset: {name}")
              if name == "synthetic_patients.csv":
                  patient_ids = {row["patient_id"] for row in rows}
                  if len(patient_ids) != len(rows):
                      raise AssertionError("duplicate patient_id")
              else:
                  for row in rows:
                      if row["patient_id"] not in patient_ids:
                          raise AssertionError(f"orphan patient_id in {name}")
          print("validate_datasets: OK")
          ''')
          PY
      - name: Install validation dependencies
        run: python -m pip install -r requirements-dev.txt
      - name: Validate generated content
        run: |
          python scripts/validate_structure.py
          python scripts/validate_markdown_links.py
          python scripts/check_required_sections.py
          python scripts/validate_notebooks.py
          python scripts/validate_datasets.py
          python scripts/execute_notebooks.py
          python -m pytest
      - name: Commit generated repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          if git diff --cached --quiet; then
            echo "No generated changes to commit."
          else
            git commit -m "Generate complete 4-week Python and LLM course repository"
            git push
          fi
